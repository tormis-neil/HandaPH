<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HandaPH Admin Login">
  <title>HandaPH — Admin Login</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- HandaPH Stylesheets -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="login-container px-3">
    <!-- Brand Logo -->
    <div class="text-center mb-4">
      <a href="../index.html" class="text-decoration-none d-inline-block">
        <h1 class="h3 fw-bold text-primary mb-0">
          <i class="fa-solid fa-shield-halved text-primary"></i>
          Handa<span class="text-secondary">PH</span>
        </h1>
      </a>
      <p class="text-muted small mt-1">Admin Portal</p>
    </div>

    <!-- Login Card -->
    <div class="card p-4 shadow-sm border-0 rounded-4">
      <h2 class="h5 fw-bold text-center mb-4 text-primary">Sign In</h2>
      <form action="dashboard.html" method="get">
        <!-- Email -->
        <div class="mb-3">
          <label for="adminEmail" class="form-label fw-semibold small text-muted">Email address</label>
          <input type="email" class="form-control" id="adminEmail" placeholder="admin@handaph.com" required>
        </div>
        
        <!-- Password -->
        <div class="mb-4">
          <label for="adminPassword" class="form-label fw-semibold small text-muted">Password</label>
          <input type="password" class="form-control" id="adminPassword" placeholder="••••••••" required>
        </div>
        
        <!-- Submit Button -->
        <div class="d-grid gap-2 mb-3">
          <button type="submit" class="btn btn-primary fw-bold py-2">Sign In</button>
        </div>
        
        <!-- Forgot Password Link -->
        <div class="text-center">
          <a href="#" class="small text-decoration-none">I forgot my password</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
